services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-CU22-ubuntu-22.04
    container_name: yamore-sqlserver
    logging: &default-logging
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "5"
    env_file:
      - .env
    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: ${SQL_SA_PASSWORD:-YourStrong!Passw0rd}
      MSSQL_SA_PASSWORD: ${SQL_SA_PASSWORD:-YourStrong!Passw0rd}
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
      # Povezivanje tvog foldera i fajlova sa Dockerom
      - ./db-backup/220245.bak:/var/opt/mssql/backup/220245.bak:ro
      - ./db-backup/init.sh:/init.sh
    # Pokretanje init skripte za automatski restore baze
    entrypoint: ["/bin/bash", "/init.sh"]
    healthcheck:
      test: [ "CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -C -S localhost -U sa -P $${MSSQL_SA_PASSWORD} -Q 'SELECT 1' || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 10

  rabbitmq:
    image: rabbitmq:3.13.7-management
    container_name: yamore-rabbitmq
    logging: *default-logging
    env_file:
      - .env
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: [ "CMD", "rabbitmq-diagnostics", "-q", "check_running" ]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Yamore.API/Dockerfile
    container_name: yamore-api
    env_file:
      - .env
    logging: *default-logging
    dns:
      - 8.8.8.8
      - 8.8.4.4
    depends_on:
      sqlserver:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ENABLE_SWAGGER: "true"
      DISABLE_HTTPS_REDIRECT: "true"
      ASPNETCORE_URLS: http://+:8080
      # Konekcijski string koristi tvoj indeks 220245
      ConnectionStrings__DefaultConnection: "Server=sqlserver,1433;Database=220245;User Id=sa;Password=${SQL_SA_PASSWORD:-YourStrong!Passw0rd};TrustServerCertificate=True;"
      RabbitMQ__HostName: rabbitmq
      RabbitMQ__Port: "5672"
      RabbitMQ__UserName: ${RABBITMQ_USER:-guest}
      RabbitMQ__Password: ${RABBITMQ_PASS:-guest}
      RabbitMQ__VirtualHost: /
      RabbitMQ__QueueName: yamore-tasks
      # Isključujemo migracije jer imamo gotov .bak fajl
      SKIP_EF_DATABASE_MIGRATE: "true"
      SKIP_DEMO_SEED: "true"
      Stripe__SecretKey: "${STRIPE_SECRET_KEY:-}"
      Stripe__PublishableKey: "${STRIPE_PUBLISHABLE_KEY:-}"
      DemoSeed__NotificationEmail: "${DEMO_NOTIFICATION_EMAIL:-}"
    ports:
      - "5096:8080"

  worker:
    build:
      context: .
      dockerfile: Yamore.Worker/Dockerfile
    container_name: yamore-worker
    logging: *default-logging
    dns:
      - 8.8.8.8
      - 8.8.4.4
    depends_on:
      rabbitmq:
        condition: service_healthy
      api:
        condition: service_started
    environment:
      DOTNET_ENVIRONMENT: Development
      RabbitMQ__HostName: rabbitmq
      RabbitMQ__Port: "5672"
      RabbitMQ__UserName: ${RABBITMQ_USER:-guest}
      RabbitMQ__Password: ${RABBITMQ_PASS:-guest}
      RabbitMQ__VirtualHost: /
      RabbitMQ__QueueName: yamore-tasks
      Smtp__Host: "${SMTP_HOST:-}"
      Smtp__Port: "${SMTP_PORT:-587}"
      Smtp__UserName: "${SMTP_USER_NAME:-}"
      Smtp__Password: "${SMTP_PASSWORD:-}"
      Smtp__UseSsl: "${SMTP_USE_SSL:-true}"
      Smtp__FromAddress: "${SMTP_FROM_ADDRESS:-noreply@yamore.example}"
      Smtp__FromDisplayName: "${SMTP_FROM_DISPLAY_NAME:-Yamore}"

volumes:
  sqlserver_data:
  rabbitmq_data: