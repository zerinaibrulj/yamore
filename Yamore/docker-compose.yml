services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: yamore-sqlserver
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "YourStrong!Passw0rd"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    healthcheck:
      test: [ "CMD-SHELL", "pidof sqlservr || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 10

  rabbitmq:
    image: rabbitmq:3-management
    container_name: yamore-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: [ "CMD", "rabbitmq-diagnostics", "-q", "check_running" ]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Yamore.API/Dockerfile
    container_name: yamore-api
    # Stripe (and other HTTPS calls) need working DNS inside the container. On some Windows/Docker setups
    # the default resolver fails with "Name or service not known" for api.stripe.com — public DNS avoids that.
    dns:
      - 8.8.8.8
      - 8.8.4.4
    depends_on:
      sqlserver:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      # Ensures Swagger UI is registered even if the runtime treats the container as non-Development.
      ENABLE_SWAGGER: "true"
      # API is only exposed as HTTP on host port 5096; avoid redirect to HTTPS that breaks Swagger/browser.
      DISABLE_HTTPS_REDIRECT: "true"
      # Listen on all interfaces (not only loopback) so Docker port publish 5096→8080 works from the host.
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: "Server=sqlserver,1433;Database=220245;User Id=sa;Password=YourStrong!Passw0rd;TrustServerCertificate=True;"
      RabbitMQ__HostName: rabbitmq
      RabbitMQ__Port: "5672"
      RabbitMQ__UserName: guest
      RabbitMQ__Password: guest
      RabbitMQ__VirtualHost: /
      RabbitMQ__QueueName: yamore-tasks
      # Keep Docker behavior deterministic: always migrate + seed on first empty DB.
      SKIP_EF_DATABASE_MIGRATE: "false"
      SKIP_DEMO_SEED: "false"
      # If the API exits with code 139, set to "true" temporarily to test whether Migrate() is involved; then apply migrations from the host with dotnet ef.
      # SKIP_EF_DATABASE_MIGRATE: "true"
      # Set to "true" to skip demo users/yachts seed (production-like empty DB after migrate).
      # SKIP_DEMO_SEED: "true"
      # Set in Yamore/.env (see .env.example) — required for card payments in the mobile app
      Stripe__SecretKey: "${STRIPE_SECRET_KEY:-}"
      Stripe__PublishableKey: "${STRIPE_PUBLISHABLE_KEY:-}"
      # Optional: real inbox for demo.admin / demo.owner / demo.user so Worker emails are deliverable (Gmail etc.)
      DemoSeed__NotificationEmail: "${DEMO_NOTIFICATION_EMAIL:-}"
    ports:
      - "5096:8080"

  worker:
    build:
      context: .
      dockerfile: Yamore.Worker/Dockerfile
    container_name: yamore-worker
    dns:
      - 8.8.8.8
      - 8.8.4.4
    depends_on:
      rabbitmq:
        condition: service_healthy
      api:
        condition: service_started
    environment:
      DOTNET_ENVIRONMENT: Development
      RabbitMQ__HostName: rabbitmq
      RabbitMQ__Port: "5672"
      RabbitMQ__UserName: guest
      RabbitMQ__Password: guest
      RabbitMQ__VirtualHost: /
      RabbitMQ__QueueName: yamore-tasks
      # Set in Yamore/.env (see .env.example) — Worker sends reservation/payment emails
      Smtp__Host: "${SMTP_HOST:-}"
      Smtp__Port: "${SMTP_PORT:-587}"
      Smtp__UserName: "${SMTP_USER_NAME:-}"
      Smtp__Password: "${SMTP_PASSWORD:-}"
      Smtp__UseSsl: "${SMTP_USE_SSL:-true}"
      Smtp__FromAddress: "${SMTP_FROM_ADDRESS:-noreply@yamore.example}"
      Smtp__FromDisplayName: "${SMTP_FROM_DISPLAY_NAME:-Yamore}"

volumes:
  sqlserver_data:
  rabbitmq_data:
